<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GIDF 2026 – Teacher Pack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F2EDE4;color:#1A1A1A;min-height:100vh}
.hdr{background:#1E1B18;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-title{font-size:18px;font-weight:700;color:#fff}
.hdr-sub{font-size:12px;color:#AAAAAA;margin-top:3px}
.badge{background:#C4581A;color:#fff;font-size:10px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:1px}
/* teacher selector */
.teacher-nav{background:#F2EDE4;padding:20px 32px 0;display:flex;gap:8px;overflow-x:auto;flex-wrap:wrap}
.t-btn{background:#fff;border:2px solid #D5CCC2;color:#333;padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;border-radius:24px;transition:all .18s;white-space:nowrap;font-family:inherit}
.t-btn:hover{border-color:#C4581A;color:#C4581A}
.t-btn.active{background:#C4581A;color:#fff;border-color:#C4581A}
/* tab nav */
.nav{background:#fff;border-bottom:2px solid #E5DDD3;padding:0 32px;display:flex;gap:2px;overflow-x:auto;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.nav-btn{background:none;border:none;color:#6B6B6B;padding:13px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .18s;white-space:nowrap;font-family:inherit}
.nav-btn:hover{color:#1A1A1A;border-bottom-color:#D5CCC2}
.nav-btn.active{color:#1A1A1A;border-bottom-color:#C4581A;font-weight:700}
/* content */
.content{max-width:960px;margin:0 auto;padding:28px 32px}
.sec-title{font-size:22px;font-weight:700;color:#1A1A1A;margin-bottom:5px}
.sec-sub{font-size:13px;color:#6B6B6B;margin-bottom:22px}
/* hero cards */
.hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px}
.hero-card{background:#fff;border:2px solid #E5DDD3;border-radius:12px;padding:20px}
.hc-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#6B6B6B;margin-bottom:6px}
.hc-val{font-size:26px;font-weight:700;color:#1A1A1A}
.hc-sub{font-size:12px;color:#999999;margin-top:4px}
.hc-orange .hc-val{color:#C4581A}
.hc-green .hc-val{color:#4A7C59}
/* schedule rows */
.sched-row{display:flex;gap:0;background:#fff;border:1px solid #E5DDD3;border-radius:9px;margin-bottom:7px;overflow:hidden}
.sched-row.mine{background:#FEF6EF;border-left:4px solid #C4581A}
.sched-row.brk{background:#F8F4EF}
.sched-row.show{background:#1E1B18}
.sched-time{min-width:120px;padding:13px 16px;font-size:13px;font-weight:700;color:#6B6B6B;border-right:1px solid #E5DDD3;flex-shrink:0}
.sched-row.mine .sched-time{color:#C4581A;border-right-color:#F4C9A0}
.sched-row.show .sched-time{color:#C4581A;border-right-color:#333}
.sched-body{padding:13px 16px;flex:1}
.sched-title{font-size:14px;font-weight:600;color:#1A1A1A}
.sched-row.mine .sched-title{color:#C4581A;font-weight:700}
.sched-row.show .sched-title{color:#fff;font-weight:700}
.sched-desc{font-size:12px;color:#6B6B6B;margin-top:2px}
.sched-row.show .sched-desc{color:#AAAAAA}
/* day label */
.day-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#999999;margin:24px 0 10px}
/* show order table */
.table-wrap{background:#fff;border:1px solid #E5DDD3;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.04)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#F8F4EF;color:#6B6B6B;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 14px;text-align:left;border-bottom:1px solid #E5DDD3}
td{padding:10px 14px;border-bottom:1px solid #F5F0E8;vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
.row-me td{background:#FEF6EF}
.row-me td:first-child{border-left:4px solid #C4581A;padding-left:10px}
.row-teacher td{background:#F0F7F3}
.num{font-size:16px;font-weight:700}
.star-ico{color:#C4581A;margin-right:3px}
.chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.chip-me{background:#FEF0E8;color:#C4581A}
.chip-teacher{background:#EDF5F1;color:#2D6A4F}
.chip-student{background:#F0F4FF;color:#3B5BDB}
.chip-op{background:#F8F4EF;color:#6B6B6B}
/* legend */
.legend{display:flex;flex-wrap:wrap;gap:10px;padding:12px 14px;background:#fff;border:1px solid #E5DDD3;border-radius:8px;margin-bottom:18px;font-size:12px;color:#6B6B6B}
.leg-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
/* checklist */
.check-head{font-size:14px;font-weight:700;color:#C4581A;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid #E5DDD3;display:flex;align-items:center;gap:6px}
.check-item{display:flex;gap:10px;padding:9px 14px;background:#fff;border:1px solid #E5DDD3;border-radius:8px;margin-bottom:6px;font-size:13px;color:#1A1A1A;align-items:flex-start}
.check-box{width:16px;height:16px;border:2px solid #D5CCC2;border-radius:3px;flex-shrink:0;margin-top:1px}
/* maps */
.map-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;margin-top:12px}
.map-card{background:#fff;border:1px solid #E5DDD3;border-radius:10px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.map-card img{width:100%;height:auto;display:block}
.map-card-wide{background:#fff;border:1px solid #E5DDD3;border-radius:10px;overflow:hidden;margin-bottom:24px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.map-card-wide img{max-width:360px;width:100%;display:block;margin:0 auto}
.map-info{padding:14px}
.map-title{font-size:13px;font-weight:700;color:#1A1A1A;margin-bottom:4px}
.map-desc{font-size:12px;color:#6B6B6B;line-height:1.5}
/* alert */
.alert{padding:13px 16px;border-radius:8px;margin-bottom:18px;font-size:13px;line-height:1.6}
.alert-orange{background:#FEF6EF;border-left:4px solid #C4581A;color:#7A3010}
.alert-green{background:#EDF5F1;border-left:4px solid #4A7C59;color:#1A4731}
/* drive link */
.drive-link{display:inline-flex;align-items:center;gap:6px;background:#FEF0E8;border:1.5px solid #C4581A;color:#C4581A;padding:9px 18px;border-radius:8px;text-decoration:none;font-size:13px;font-weight:700;margin:6px 0 20px}
.drive-link:hover{background:#FEE0CC}
/* closing */
.sig-block{margin-top:28px;padding-top:18px;border-top:1px solid #E5DDD3;font-size:13px;color:#6B6B6B}
.sig-name{font-weight:700;color:#1A1A1A;font-size:14px;margin-bottom:3px}
.sig-link{color:#C4581A;text-decoration:none;font-weight:600}

/* ===== INFO NEEDED FORM ===== */
.info-form{max-width:660px}
.form-section{background:#fff;border:1px solid #E5DDD3;border-radius:10px;padding:22px 24px;margin-bottom:18px}
.form-sec-head{font-size:15px;font-weight:700;color:#1E1B18;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid #F0E8DE}
.form-field{margin-bottom:16px}
.form-field:last-child{margin-bottom:0}
.form-label{display:block;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#6B6B6B;margin-bottom:6px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1.5px solid #E5DDD3;border-radius:7px;font-size:14px;font-family:inherit;color:#1E1B18;background:#FAFAF8;outline:none;transition:border-color .15s;box-sizing:border-box}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:#C4581A}
.form-textarea{min-height:80px;resize:vertical}
.radio-group{display:flex;flex-direction:column;gap:10px;margin-top:4px}
.radio-lbl{display:flex;align-items:flex-start;gap:9px;font-size:14px;color:#3B3B3B;cursor:pointer;line-height:1.4}
.radio-lbl input[type=radio]{accent-color:#C4581A;width:16px;height:16px;margin-top:2px;flex-shrink:0}
.photo-preview{max-width:200px;max-height:200px;border-radius:8px;margin-top:12px;display:none;border:2px solid #E5DDD3;object-fit:cover}
.file-wrap{position:relative;display:inline-block}
.file-btn{display:inline-block;padding:8px 16px;background:#F2EDE4;border:1.5px solid #C4581A;border-radius:7px;font-size:13px;color:#C4581A;cursor:pointer;font-weight:600;font-family:inherit}
.file-btn:hover{background:#EADDD0}
.file-real{position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer}
.generate-btn{width:100%;padding:14px;background:#C4581A;color:#fff;border:none;border-radius:9px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;font-family:inherit;letter-spacing:.2px}
.generate-btn:hover{background:#A84515}
.code-output{margin-top:16px;padding:18px;background:#F8F5F0;border:1.5px solid #E5DDD3;border-radius:9px}
.code-output-title{font-size:12px;font-weight:700;color:#6B6B6B;text-transform:uppercase;letter-spacing:.7px;margin-bottom:10px}
.code-textarea{width:100%;padding:10px;background:#fff;border:1.5px solid #E5DDD3;border-radius:6px;font-size:11px;font-family:monospace;color:#3B3B3B;min-height:72px;resize:vertical;box-sizing:border-box}
.copy-btn{margin-top:8px;padding:8px 18px;background:#4A7C59;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.copy-btn:hover{background:#3A6348}
.drive-note{background:#F0F7F3;border:1px solid #C3DDD0;border-radius:8px;padding:12px 14px;font-size:13px;color:#2D6A4F;margin-top:8px}


.sched-row.req{background:linear-gradient(to right,#FEF0E7,#fff);border-left:3px solid #C4581A}
.sched-row.other-t{background:#F3F9F6}
.req-note{font-size:12px;color:#A84515;font-style:italic;margin-top:4px}
.t-chip{display:inline-block;background:#DDF0E8;color:#2D6A4F;font-size:11px;font-weight:600;padding:1px 7px;border-radius:7px;margin-left:6px;vertical-align:middle}

</style>
</head>

const FORM_STATE = {};
TEACHERS.forEach(function(t) {
  FORM_STATE[t.id] = {
    song:'', style:'', duration:'', costumeColor:'',
    costumePhoto:null,
    frontLight:'Warm white centre spot',
    backLEDs:'Warm amber',
    sideLight:'Soft warm',
    smoke:'no', smokeTransition:'', blackout:false,
    cue:'onstage', entrySide:'right', bow:true,
    lightCues:'', special:''
  };
});

function saveField(tid, field, value) {
  if(FORM_STATE[tid]) FORM_STATE[tid][field] = value;
}
function saveBool(tid, field, val) {
  if(FORM_STATE[tid]) FORM_STATE[tid][field] = (val === 'true' || val === true);
}
function handleSmokeChange(tid, val) {
  saveField(tid, 'smoke', val);
  var el = document.getElementById('smoke-transition-' + tid);
  if(el) el.style.display = (val === 'transition') ? 'block' : 'none';
}
function handlePhotoUpload(tid, input) {
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    FORM_STATE[tid].costumePhoto = e.target.result;
    var prev = document.getElementById('photo-prev-' + tid);
    if(prev){ prev.src = e.target.result; prev.style.display = 'block'; }
  };
  reader.readAsDataURL(file);
}
function generateCode(tid) {
  var s = FORM_STATE[tid];
  var t = TEACHERS.find(function(x){ return x.id === tid; });
  var lights = [];
  if(s.frontLight) lights.push('Front: ' + s.frontLight);
  if(s.backLEDs)   lights.push('Back LEDs: ' + s.backLEDs);
  if(s.sideLight && s.sideLight !== 'Off') lights.push('Side: ' + s.sideLight);
  var smokeDesc = 'No';
  if(s.smoke === 'start') smokeDesc = 'Yes \u2014 at the start of performance';
  else if(s.smoke === 'transition') smokeDesc = 'Yes \u2014 at a transition' + (s.smokeTransition ? ': ' + s.smokeTransition : '');
  var data = {
    teacherId: tid,
    teacherName: t.name,
    actNum: t.act,
    song: s.song,
    style: s.style,
    duration: s.duration,
    costumeColor: s.costumeColor,
    lights: lights.join('\n'),
    lightCues: s.lightCues,
    smoke: s.smoke,
    smokeTransition: s.smokeTransition || '',
    blackout: s.blackout,
    cue: s.cue,
    entrySide: s.entrySide,
    bow: s.bow,
    special: s.special
  };
  var entryDesc = (s.cue === 'onstage' ? 'Already on stage' : 'Enter from wing');
  var sideDesc  = s.entrySide === 'right' ? 'Stage Right' : s.entrySide === 'left' ? 'Stage Left' : 'Centre';
  var summaryLines = [
    '\uD83C\uDFAD Act ' + t.act + ' \u2014 ' + t.name,
    '\uD83C\uDFB5 Song: ' + (s.song || '\u2014') + (s.style ? ' (' + s.style + ')' : '') + (s.duration ? ' \u00b7 ' + s.duration : ''),
    s.costumeColor ? '\uD83D\uDC57 Costume colour: ' + s.costumeColor : null,
    '\uD83D\uDCA1 Lights: ' + (lights.length ? lights.join(', ') : '\u2014'),
    s.lightCues ? '\u23F1 Light cues: ' + s.lightCues : null,
    '\uD83D\uDCA8 Smoke: ' + smokeDesc,
    '\u2B1B Blackout at end: ' + (s.blackout ? 'Yes' : 'No'),
    '\uD83D\uDEB6 Entry: ' + entryDesc + ' \u00b7 ' + sideDesc,
    '\uD83D\uDE47 Bow at end: ' + (s.bow ? 'Yes' : 'No'),
    s.special ? '\uD83D\uDCDD Special requirements: ' + s.special : null
  ].filter(Boolean).join('\n');
  var json = JSON.stringify(data);
  var code;
  try { code = btoa(unescape(encodeURIComponent(json))); }
  catch(e) { code = btoa(json); }
  var out   = document.getElementById('code-out-' + tid);
  var ta    = document.getElementById('code-ta-'  + tid);
  var sumEl = document.getElementById('code-summary-' + tid);
  if(out)   out.style.display = 'block';
  if(ta)    ta.value = code;
  if(sumEl) sumEl.textContent = summaryLines;
}
function copyCode(tid) {
  var ta = document.getElementById('code-ta-' + tid);
  if(!ta) return;
  ta.select();
  document.execCommand('copy');
  var conf = document.getElementById('copy-conf-' + tid);
  if(conf){ conf.style.opacity = '1'; setTimeout(function(){ conf.style.opacity = '0'; }, 2200); }
}

let currentTeacher = TEACHERS[0].id;
let currentTab = 'schedule';

const TABS = [
  { id:'schedule',  label:'Your Schedule' },
  { id:'showorder', label:'Show Order' },
  { id:'tech',      label:'Tech Rehearsal' },
  { id:'venue',     label:'Venue Maps' },
  { id:'info',      label:'Info Needed' },
];

function renderTeacherNav() {
  document.getElementById('teacherNav').innerHTML = TEACHERS.map(t =>
    `<button class="t-btn${t.id===currentTeacher?' active':''}" onclick="selectTeacher('${t.id}')">${t.name}</button>`
  ).join('');
}
function renderTabNav() {
  document.getElementById('tabNav').innerHTML = TABS.map(t =>
    `<button class="nav-btn${t.id===currentTab?' active':''}" onclick="selectTab('${t.id}')">${t.label}</button>`
  ).join('');
}
function selectTeacher(id){ currentTeacher=id; renderTeacherNav(); render(); }
function selectTab(id){ currentTab=id; renderTabNav(); render(); }

function render(){
  const t = TEACHERS.find(x=>x.id===currentTeacher);
  const c = document.getElementById('content');
  if(currentTab==='schedule')  c.innerHTML = renderSchedule(t);
  if(currentTab==='showorder') c.innerHTML = renderShowOrder(t);
  if(currentTab==='tech')      c.innerHTML = renderTech(t);
  if(currentTab==='venue')     c.innerHTML = renderVenue();
  if(currentTab==='info')      c.innerHTML = renderInfo(t);
}

  const satHtml = SAT.map(rowHtml).join('');
  const sunHtml = SUN.map(function(r){
    // For Sunday, only show teacher's own row highlighted (others with chip)
    return rowHtml(r);
  }).join('');

  // Which days does this teacher teach on?
  const teachesOnSun = (t.id==='colleena'||t.id==='desihop'||t.id==='vaishali');

  return '<div class="sec-title">' + t.name + ' \u2014 GIDF 2026 Full Schedule</div>'
    + '<div class="sec-sub">All three days \u00b7 <span style="color:#C4581A;font-weight:600">Orange</span> = your sessions \u00b7 <span style="color:#4A7C59;font-weight:600">Green</span> = fellow teachers</div>'
    + '<div class="day-label">Friday 1 May 2026</div>'
    + friHtml
    + '<div class="day-label" style="margin-top:24px">Saturday 2 May 2026</div>'
    + satHtml
    + '<div class="day-label" style="margin-top:24px">Sunday 3 May 2026</div>'
    + (teachesOnSun ? '' : '<div style="font-size:13px;color:#888;padding:10px 0 6px">You don\u2019t have a workshop on Sunday \u2014 you\u2019re welcome to join as a participant.</div>')
    + sunHtml;
}

function renderShowOrder(t) {
  const rows = SHOW.map(a => {
    const isMe = a.id === t.id;
    const isT  = a.type==='teacher';
    const rowCls = isMe?'row-me':isT?'row-teacher':'';
    const numColor = isMe?'#C4581A':isT?'#4A7C59':'#999999';
    const chip = isMe?'<span class="chip chip-me">You</span>':
                 isT?'<span class="chip chip-teacher">Guest Teacher</span>':
                 a.type==='op'?'<span class="chip chip-op">Opening Party</span>':
                 '<span class="chip chip-student">Students</span>';
    return `<tr class="${rowCls}">
      <td><span class="num" style="color:${numColor}">${a.num}</span></td>
      <td>${isMe?'<span class="star-ico">★</span>':''}<span style="font-weight:${isMe||isT?700:400};color:${isMe?'#C4581A':isT?'#2D6A4F':'#1A1A1A'}">${a.performer}</span></td>
      <td style="color:#6B6B6B;font-style:${!isMe&&!isT?'italic':'normal'}">${a.song}</td>
      <td>${chip}</td>
    </tr>`;
  }).join('');

  return `<div class="sec-title">Gala Show Order — 18 Acts</div>
<div class="sec-sub">Your act highlighted in orange · Fellow guest teachers in green</div>
<div class="legend">
  <span><span class="leg-dot" style="background:#C4581A"></span>You</span>
  <span><span class="leg-dot" style="background:#4A7C59"></span>Guest Teachers</span>
  <span><span class="leg-dot" style="background:#3B5BDB"></span>Students</span>
  <span><span class="leg-dot" style="background:#999"></span>Opening Party</span>
</div>
<div class="table-wrap"><table>
  <thead><tr><th>#</th><th>Performer</th><th>Song</th><th>Type</th></tr></thead>
  <tbody>${rows}</tbody>
</table></div>`;
}

function renderTech(t) {
  const rows = TECH.map(r => {
    const isMe = r.teacher===t.id;
    const isShow = r.time==='20:30';
    const rowStyle = isMe ? 'background:#FEF6EF' : isShow ? 'background:#1E1B18' : '';
    const timeColor = isMe?'#C4581A':isShow?'#C4581A':'#6B6B6B';
    const lblColor  = isMe?'#C4581A':isShow?'#fff':'#1A1A1A';
    return `<tr style="${rowStyle}">
      <td style="font-weight:${isMe?700:400};color:${timeColor};white-space:nowrap">${r.time}</td>
      <td style="color:#999999">${r.act||''}</td>
      <td style="font-weight:${isMe?700:400};color:${lblColor}">${isMe?'<span class="star-ico">★</span> ':''}${r.label}</td>
    </tr>`;
  }).join('');

  return `<div class="sec-title">Tech Rehearsal — Saturday 2 May</div>
<div class="sec-sub">Full show order · 10 minutes per act · Be backstage 5 min before your slot</div>
<div class="alert alert-orange">Your slot: <strong>Act ${t.act} at ${t.slot}</strong></div>
<div class="table-wrap"><table>
  <thead><tr><th>Time</th><th>Act</th><th>Performer</th></tr></thead>
  <tbody>${rows}</tbody>
</table></div>`;
}

<div class="sec-sub">All performances take place on the First Floor (Studio Art Deco)</div>
<div class="alert alert-green">Your dedicated changing room as a guest teacher is <strong>Studio Ananta on the Ground Floor</strong>. Stairs lead directly up to backstage.</div>
<div class="map-card-wide">

  <div class="map-info">

  </div>
</div>
<div class="map-grid">

    <div class="map-info">

function renderInfo(t) {
  if(t.id === 'swapnil') {
    return '<div class="sec-title">All set, Swapnil \u2665</div>'
      + '<div class="sec-sub">This form is for your guest teachers to send you their info \u2014 you already know everything!</div>'
      + '<div class="alert alert-green" style="margin-top:24px;line-height:1.9">'
      + '<strong>Your Gala moments</strong> \u00b7 Act 16 \u2014 Kalbeliya solo at 19:30 &nbsp;\u00b7&nbsp; Tech rehearsal Sat 2 May<br>'
      + '<strong>Opening Party</strong> \u00b7 DJ @swapkebolly from 22:00 on Fri 1 May<br>'
      + '<strong>Sunday</strong> \u00b7 Lavani: The Bold Heart of Maharashtra \u00b7 13:30 \u2013 15:30'
      + '</div>';
  }
  var s   = FORM_STATE[t.id];
  var tid = t.id;

  function mkSel(opts, field) {
    var options = opts.map(function(o) {
      return '<option value="' + o + '"' + (s[field] === o ? ' selected' : '') + '>' + o + '</option>';
    }).join('');
    return '<select class="form-select" onchange="saveField(\'' + tid + '\',\'' + field + '\',this.value)">' + options + '</select>';
  }

  function mkRadio(name, val, lbl, field, boolField) {
    var chk = false;
    if(boolField) {
      chk = (val === 'yes' && s[field] === true) || (val === 'no' && s[field] === false);
    } else {
      chk = (s[field] === val);
    }
    var onChange;
    if(boolField) {
      onChange = 'saveBool(\'' + tid + '\',\'' + field + '\',\'' + (val === 'yes' ? 'true' : 'false') + '\')';
    } else {
      onChange = 'saveField(\'' + tid + '\',\'' + field + '\',\'' + val + '\')';
    }
    return '<label class="radio-lbl"><input type="radio" name="' + name + '-' + tid + '" value="' + val + '"'
      + (chk ? ' checked' : '') + ' onchange="' + onChange + '"> ' + lbl + '</label>';
  }

  var pSrc   = s.costumePhoto || '';
  var pStyle = s.costumePhoto ? 'display:block' : 'display:none';

  return '<div class="info-form">'

    // header
    + '<div class="sec-title">Info Needed \u2014 ' + t.name + '</div>'
    + '<div class="sec-sub">Fill in the form \u00b7 Click \u201cGenerate Summary\u201d at the bottom \u00b7 Send the code to Swapnil so it can be imported into the Light Script</div>'

    // MUSIC
    + '<div class="form-section">'
    + '<div class="form-sec-head">\uD83C\uDFB5 Music</div>'
    + '<div class="form-field"><label class="form-label">Song title &amp; artist</label>'
    + '<input class="form-input" type="text" value="' + s.song + '" placeholder="e.g. Morya Re \u2014 Shankar Mahadevan" oninput="saveField(\'' + tid + '\',\'song\',this.value)"></div>'
    + '<div class="form-field"><label class="form-label">Dance style / genre</label>'
    + '<input class="form-input" type="text" value="' + s.style + '" placeholder="e.g. Bharatanatyam / Giddha / Kuthu" oninput="saveField(\'' + tid + '\',\'style\',this.value)"></div>'
    + '<div class="form-field"><label class="form-label">Duration (mm:ss)</label>'
    + '<input class="form-input" type="text" value="' + s.duration + '" placeholder="e.g. 4:32" style="max-width:160px" oninput="saveField(\'' + tid + '\',\'duration\',this.value)"></div>'
    + '<div class="form-field"><label class="form-label">Music track upload</label>'
    + '<div class="drive-note">Upload your track to your Google Drive folder: '
    + '<a href="' + t.drive + '" target="_blank" style="color:#2D6A4F;font-weight:700">Open ' + t.name + '\u2019s folder \u2197</a>'
    + '<div style="margin-top:5px;color:#5A9575;font-size:12px">Name the file clearly \u2014 e.g. ' + t.name + '_track_final.mp3</div></div>'
    + '</div>'
    + '</div>'

    // COSTUME
    + '<div class="form-section">'
    + '<div class="form-sec-head">\uD83D\uDC57 Costume</div>'
    + '<div class="form-field"><label class="form-label">Costume colour(s)</label>'
    + '<input class="form-input" type="text" value="' + s.costumeColor + '" placeholder="e.g. deep red and gold" oninput="saveField(\'' + tid + '\',\'costumeColor\',this.value)"></div>'
    + '<div class="form-field"><label class="form-label">Costume photo</label>'
    + '<div class="file-wrap"><button class="file-btn">\uD83D\uDCF7 Choose photo</button>'
    + '<input class="file-real" type="file" accept="image/*" onchange="handlePhotoUpload(\'' + tid + '\',this)"></div>'
    + '<img id="photo-prev-' + tid + '" class="photo-preview" src="' + pSrc + '" style="' + pStyle + '" alt="Costume preview">'
    + '<div style="font-size:12px;color:#999;margin-top:7px">Photo is stored locally in your browser \u00b7 You can also upload to your Drive folder</div>'
    + '</div>'
    + '</div>'

    // LIGHT PLAN
    + '<div class="form-section">'
    + '<div class="form-sec-head">\uD83D\uDCA1 Light Plan</div>'
    + '<div style="font-size:13px;color:#888;margin-bottom:16px">Keep it simple \u2014 limited rehearsal time. Choose from the presets below.</div>'
    + '<div class="form-field"><label class="form-label">Front light</label>' + mkSel(LIGHT_OPTIONS.front, 'frontLight') + '</div>'
    + '<div class="form-field"><label class="form-label">Back LEDs</label>'  + mkSel(LIGHT_OPTIONS.back,  'backLEDs')   + '</div>'
    + '<div class="form-field"><label class="form-label">Side light</label>' + mkSel(LIGHT_OPTIONS.side,  'sideLight')  + '</div>'
    + '<div class="form-field"><label class="form-label">Light change moments</label>'
    + '<textarea class="form-textarea" style="min-height:64px" placeholder="e.g. \u201cChange to blue wash at 1:30 for slow section\u201d \u00b7 \u201cSpot only at 2:45\u201d \u00b7 \u201cFade down at 3:00 for ending\u201d \u2014 use timestamps (mm:ss) to mark cues" oninput="saveField(\'' + tid + '\',\'lightCues\',this.value)">' + s.lightCues + '</textarea>'
    + '<div style="font-size:12px;color:#999;margin-top:5px">Optional \u2014 only note moments where the light must change during your piece</div>'
    + '</div>'
    + '<div class="form-field"><label class="form-label">Smoke machine</label><div class="radio-group">'
    + '<label class="radio-lbl"><input type="radio" name="smoke-' + tid + '" value="no"' + (s.smoke === 'no' || s.smoke === false ? ' checked' : '') + ' onchange="handleSmokeChange(\'' + tid + '\',\'no\')"> No smoke</label>'
    + '<label class="radio-lbl"><input type="radio" name="smoke-' + tid + '" value="start"' + (s.smoke === 'start' ? ' checked' : '') + ' onchange="handleSmokeChange(\'' + tid + '\',\'start\')"> Yes \u2014 at the start of my performance</label>'
    + '<label class="radio-lbl"><input type="radio" name="smoke-' + tid + '" value="transition"' + (s.smoke === 'transition' ? ' checked' : '') + ' onchange="handleSmokeChange(\'' + tid + '\',\'transition\')"> Yes \u2014 at a specific transition moment</label>'
    + '</div>'
    + '<div id="smoke-transition-' + tid + '" style="' + (s.smoke === 'transition' ? '' : 'display:none;') + 'margin-top:8px">'
    + '<input type="text" class="form-input" style="width:100%;padding:8px 12px;border:1px solid #d4c5b5;border-radius:6px;font-size:14px" placeholder="Describe the moment \u2014 e.g. \u201cbetween the two songs\u201d or \u201cafter the first 30 seconds\u201d" value="' + (s.smokeTransition||'') + '" oninput="saveField(\'' + tid + '\',\'smokeTransition\',this.value)">'
    + '</div>'
    + '</div>'
    + '<div class="form-field"><label class="form-label">Blackout at end of your act</label><div class="radio-group">'
    + mkRadio('blackout','yes', 'Yes \u2014 blackout after my act', 'blackout', true)
    + mkRadio('blackout','no',  'No \u2014 keep lights on',         'blackout', true)
    + '</div></div>'
    + '</div>'

    // STAGE & CUES
    + '<div class="form-section">'
    + '<div class="form-sec-head">\uD83C\uDFAC Stage &amp; Cues</div>'
    + '<div class="form-field"><label class="form-label">Music cue \u2014 when do you enter?</label><div class="radio-group">'
    + mkRadio('cue', 'onstage', 'Already on stage when music starts', 'cue', false)
    + mkRadio('cue', 'wing',    'Enter from the wing after music begins', 'cue', false)
    + '</div></div>'
    + '<div class="form-field"><label class="form-label">Entry side</label><div class="radio-group">'
    + mkRadio('entry', 'right',  'Stage Right (left wing as you face the audience)',  'entrySide', false)
    + mkRadio('entry', 'left',   'Stage Left (right wing as you face the audience)',  'entrySide', false)
    + mkRadio('entry', 'centre', 'Centre \u2014 from the curtain',                    'entrySide', false)
    + '</div></div>'
    + '<div class="form-field"><label class="form-label">Bow at the end</label><div class="radio-group">'
    + mkRadio('bow', 'yes', 'Yes \u2014 I will take a bow',   'bow', true)
    + mkRadio('bow', 'no',  'No \u2014 I will exit directly', 'bow', true)
    + '</div></div>'
    + '<div class="form-field"><label class="form-label">Special requirements</label>'
    + '<textarea class="form-textarea" placeholder="Props, live musician, specific lighting moment, anything else\u2026" oninput="saveField(\'' + tid + '\',\'special\',this.value)">' + s.special + '</textarea>'
    + '</div>'
    + '</div>'

    // GENERATE CODE
    + '<button class="generate-btn" onclick="generateCode(\'' + tid + '\')">\u2709 Generate Summary for Swapnil</button>'
    + '<div id="code-out-' + tid + '" class="code-output" style="display:none">'
    + '<div class="code-output-title">\uD83D\uDCCB Check your submission below \u2014 make sure everything looks right before sending</div>'
    + '<pre id="code-summary-' + tid + '" style="background:#f8f4ef;border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.8;white-space:pre-wrap;margin:0 0 18px 0;color:#3a2a1a;border:1px solid #e8ddd4;font-family:inherit"></pre>'
    + '<div class="code-output-title" style="margin-top:0">\uD83D\uDD10 Your code \u2014 copy and send this to Swapnil</div>'
    + '<textarea id="code-ta-' + tid + '" class="code-textarea" readonly placeholder="Code will appear here\u2026"></textarea>'
    + '<br><button class="copy-btn" onclick="copyCode(\'' + tid + '\')">Copy code to clipboard</button>'
    + '<span id="copy-conf-' + tid + '" style="font-size:12px;color:#4A7C59;margin-left:10px;opacity:0;transition:opacity .3s;font-weight:600">\u2713 Copied!</span>'
    + '</div>'

    + '</div>';
}


renderTeacherNav();
renderTabNav();
render();
</script>
</body>
